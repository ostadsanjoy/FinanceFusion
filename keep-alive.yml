name: Keep Render backend alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf "${{ secrets.BACKEND_URL }}/" || echo "Ping failed (backend may be cold-starting)"