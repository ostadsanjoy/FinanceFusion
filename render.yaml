services:
  # --- Backend: FastAPI ---
  - type: web
    name: financefusion-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./finance.db
      - key: OTP_EXPIRE_MINUTES
        value: "10"
      - key: MAX_OTP_ATTEMPTS
        value: "5"
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Finance Fusion
      - key: FRONTEND_ORIGIN
        sync: false
    healthCheckPath: /

  # --- Frontend: Vite/React static site ---
  - type: web
    name: financefusion-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html